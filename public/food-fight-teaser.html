<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Fight — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Boogaloo&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #e03030;
      --red-dark: #8b0000;
      --red-bright: #ff4444;
      --red-glow: rgba(220,50,50,0.5);
      --bg: #09080d;
      --card-bg: #150b0b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: #f5e8e8;
      font-family: 'Fredoka One', cursive;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ═══ HERO ═════════════════════════════════════════════════════════ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-bottom: 60px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 55%, rgba(180,20,20,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(100,0,0,0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(100,0,0,0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    /* floating food particles */
    .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      bottom: -30px;
      font-size: 16px;
      animation: particleRise linear infinite;
      opacity: 0;
      user-select: none;
    }
    @keyframes particleRise {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(540deg); opacity: 0; }
    }

    /* headline */
    .headline-wrap {
      position: relative;
      z-index: 5;
      text-align: center;
      margin-bottom: 12px;
      pointer-events: none;
    }
    .headline-eyebrow {
      font-size: 11px;
      letter-spacing: 6px;
      color: rgba(255,150,150,0.45);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ═══ BERRY ════════════════════════════════════════════════════════ */
    .berry-wrap {
      position: relative;
      width: 200px;
      height: 220px;
      cursor: pointer;
      z-index: 10;
      flex-shrink: 0;
    }

    /* SVG berry */
    .berry-svg {
      position: absolute;
      left: 50%; top: 52%;
      transform: translate(-50%, -50%);
      width: 100px; height: 116px;
      animation: berryBounce 1.15s ease-in-out infinite;
      transform-origin: center bottom;
      transition: opacity 0.06s, transform 0.06s;
      filter: drop-shadow(0 0 18px rgba(200,30,30,0.55)) drop-shadow(0 6px 16px rgba(0,0,0,0.7));
    }

    @keyframes berryBounce {
      0%,100% { transform: translate(-50%, -50%) scaleY(1)   scaleX(1); }
      38%     { transform: translate(-50%, calc(-50% - 20px)) scaleY(1.09) scaleX(0.93); }
      58%     { transform: translate(-50%, calc(-50% + 5px))  scaleY(0.87) scaleX(1.11); }
      74%     { transform: translate(-50%, calc(-50% - 7px))  scaleY(1.04) scaleX(0.97); }
    }

    /* ═══ SPLAT ════════════════════════════════════════════════════════ */
    .splat-root {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 190px; height: 190px;
      pointer-events: none;
      z-index: 8;
    }

    /* main blob SVG */
    .splat-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      opacity: 0;
      filter: drop-shadow(0 0 30px rgba(200,0,0,0.7)) drop-shadow(0 0 70px rgba(150,0,0,0.4));
    }

    /* text inside splat */
    .splat-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 12;
      opacity: 0;
      transform: scale(0.4) rotate(-8deg);
      transition: none;
    }
    .splat-label span {
      font-family: 'Fredoka One', cursive;
      font-size: 34px;
      line-height: 1;
      text-align: center;
      color: #fff8f0;
      text-shadow: 3px 3px 0 #6b0000, -1px -1px 0 #6b0000, 0 4px 10px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }

    /* drip drops */
    .drip {
      position: absolute;
      background: #cc1111;
      border-radius: 50% 50% 60% 40% / 40% 40% 65% 55%;
      opacity: 0;
      pointer-events: none;
      z-index: 9;
    }

    /* ── SPLATTED state ─────────────────────────────────────────────── */
    .splatted .berry-svg {
      opacity: 0 !important;
      transform: translate(-50%, -50%) scale(0) !important;
      animation: none !important;
      transition: opacity 0.04s, transform 0.04s !important;
    }

    .splatted .splat-root {
      animation: splatPop 0.38s cubic-bezier(0.17,0.89,0.32,1.5) forwards;
    }

    @keyframes splatPop {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(0deg); }
      28%  { transform: translate(-50%,-50%) scale(1.45) rotate(-10deg); }
      52%  { transform: translate(-50%,-50%) scale(0.88) rotate(5deg); }
      72%  { transform: translate(-50%,-50%) scale(1.12) rotate(-2deg); }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    }

    .splatted .splat-svg {
      animation: splatFadeIn 0.12s 0.05s ease-out forwards;
    }
    @keyframes splatFadeIn { from { opacity:0; } to { opacity:1; } }

    .splatted .splat-label {
      opacity: 1;
      transform: scale(1) rotate(-3deg);
      transition: opacity 0.18s 0.22s ease-out, transform 0.28s 0.22s cubic-bezier(0.17,0.89,0.32,1.4) !important;
    }

    .splatted .drip {
      animation: dripFly 0.55s ease-out forwards;
    }
    @keyframes dripFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.25); }
    }

    /* ── hover hint ── */
    .hover-hint {
      margin-top: 130px;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      animation: hintPulse 3s ease-in-out infinite;
      z-index: 5;
      position: relative;
      transition: opacity 0.4s;
    }
    @keyframes hintPulse {
      0%,100% { opacity: 0.12; }
      50%     { opacity: 0.45; }
    }

    /* ═══ COMING SOON ══════════════════════════════════════════════════ */
    .coming-soon-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 0 16px;
      text-align: center;
      background: linear-gradient(0deg, rgba(9,8,13,0.98) 0%, transparent 100%);
      z-index: 100;
      pointer-events: none;
    }
    .coming-soon-text {
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      letter-spacing: 7px;
      color: var(--red-bright);
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,80,80,0.5);
      animation: comingSoonPulse 2.6s ease-in-out infinite;
    }
    @keyframes comingSoonPulse {
      0%,100% { opacity: 0.25; text-shadow: 0 0 10px rgba(255,80,80,0.2); }
      50%     { opacity: 1;    text-shadow: 0 0 32px rgba(255,80,80,0.9), 0 0 70px rgba(255,80,80,0.3); }
    }

    /* ═══ STORE / ROSTER SECTION ═══════════════════════════════════════ */
    .store {
      position: relative;
      background: linear-gradient(180deg, #09080d 0%, #0f0609 40%, #09080d 100%);
      padding: 80px 28px 100px;
      border-top: 1px solid rgba(180,30,30,0.18);
      text-align: center;
      overflow: hidden;
    }

    .store::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(150,20,20,0.14) 0%, transparent 55%);
      pointer-events: none;
    }

    .store-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(255,120,120,0.4);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .store-title {
      font-family: 'Fredoka One', cursive;
      font-size: 40px;
      color: #ff6060;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow: 0 0 50px rgba(220,50,50,0.45);
    }

    .store-sub {
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(255,160,160,0.4);
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    /* card grid */
    .card-grid {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 1000px;
      margin: 0 auto 60px;
    }

    .t-card {
      width: 116px;
      height: 162px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.22s, box-shadow 0.22s;
      position: relative;
      animation: cardFloat ease-in-out infinite, cardReveal 0.5s ease-out both;
    }

    .t-card:hover {
      transform: translateY(-12px) scale(1.08) rotate(-1.5deg) !important;
      box-shadow: 0 22px 44px rgba(200,40,40,0.55) !important;
      z-index: 20;
    }

    @keyframes cardFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes cardReveal {
      from { opacity:0; transform: translateY(24px) scale(0.88); }
      to   { opacity:1; transform: translateY(0)   scale(1); }
    }

    .t-card-inner {
      width: 100%; height: 100%;
      border-radius: 12px;
      background: linear-gradient(160deg, #1a0808, #270c0c);
      border: 2px solid rgba(180,30,30,0.28);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7), inset 0 0 30px rgba(100,0,0,0.08);
    }

    /* inner decorative border */
    .t-card-inner::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(180,30,30,0.13);
      border-radius: 8px;
      pointer-events: none;
    }

    /* shimmer overlay on hover */
    .t-card-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,100,100,0.06) 50%, transparent 60%);
      background-size: 200% 200%;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 12px;
    }
    .t-card:hover .t-card-inner::after { opacity: 1; }

    .card-emoji-wrap {
      font-size: 32px;
      filter: grayscale(70%) brightness(0.65) saturate(0.4);
      transition: filter 0.25s;
      line-height: 1;
    }
    .t-card:hover .card-emoji-wrap { filter: grayscale(0%) brightness(1) saturate(1.2); }

    .card-q {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: rgba(180,40,40,0.22);
      line-height: 1;
      transition: color 0.25s;
    }
    .t-card:hover .card-q { color: rgba(220,80,80,0.5); }

    .card-label {
      font-family: 'Fredoka One', cursive;
      font-size: 8.5px;
      color: rgba(180,80,80,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      padding: 0 10px;
      transition: color 0.25s;
    }
    .t-card:hover .card-label { color: rgba(255,140,140,0.75); }

    /* corner cost pip */
    .card-cost {
      position: absolute;
      top: 6px; left: 6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(140,20,20,0.5);
      border: 1px solid rgba(200,60,60,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      color: rgba(255,120,120,0.35);
    }

    /* pack + cta */
    .pack-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: 8px;
    }

    .pack-card {
      width: 148px; height: 200px;
      border-radius: 16px;
      background: linear-gradient(160deg, #1e0808, #380e0e);
      border: 2px solid rgba(200,40,40,0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 0 50px rgba(180,30,30,0.3), 0 8px 32px rgba(0,0,0,0.8), inset 0 0 24px rgba(180,30,30,0.07);
      animation: packPulse 2.4s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.25s;
    }
    .pack-card:hover { transform: translateY(-8px) scale(1.04); }

    @keyframes packPulse {
      0%,100% { box-shadow: 0 0 36px rgba(180,30,30,0.3), 0 8px 32px rgba(0,0,0,0.8); }
      50%     { box-shadow: 0 0 70px rgba(200,40,40,0.6), 0 8px 40px rgba(0,0,0,0.8), 0 0 120px rgba(160,20,20,0.2); }
    }

    .pack-icon { font-size: 52px; }

    .pack-title {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: #ff8888;
      letter-spacing: 1px;
    }

    .pack-sub-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,140,140,0.35);
      text-transform: uppercase;
    }

    .pack-seal {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px dashed rgba(200,60,60,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .cta-btn {
      padding: 15px 44px;
      background: linear-gradient(135deg, #b81010, #e02828);
      border: none;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 17px;
      color: #fff;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 4px 24px rgba(200,40,40,0.45);
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      border-radius: 50px;
    }
    .cta-btn:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 10px 36px rgba(220,50,50,0.65);
      background: linear-gradient(135deg, #cc1818, #f03838);
    }
    .cta-btn:active { transform: scale(0.97); }
    .cta-btn.done {
      background: linear-gradient(135deg, #156b15, #22a022);
      box-shadow: 0 4px 20px rgba(30,160,30,0.4);
    }

    /* count badge */
    .count-badge {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid rgba(180,30,30,0.25);
      background: rgba(180,30,30,0.08);
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,120,120,0.5);
    }
  </style>
</head>
<body>

<!-- ═══ HERO ══════════════════════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="particles" id="particles"></div>

  <div class="headline-wrap">
    <div class="headline-eyebrow">A Card Game of Culinary Chaos</div>
  </div>

  <!-- Berry + Splat -->
  <div class="berry-wrap" id="berryWrap">

    <!-- SVG Berry -->
    <svg class="berry-svg" id="berrySvg" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg">
      <!-- stem -->
      <path d="M50 18 Q54 8 58 3" stroke="#2e7d32" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      <!-- leaf -->
      <ellipse cx="59" cy="10" rx="10" ry="6" fill="#388e3c" transform="rotate(-30 59 10)"/>
      <!-- berry body -->
      <ellipse cx="50" cy="65" rx="38" ry="44" fill="url(#berryGrad)"/>
      <!-- specular highlight -->
      <ellipse cx="35" cy="46" rx="10" ry="7" fill="rgba(255,255,255,0.32)" transform="rotate(-20 35 46)"/>
      <ellipse cx="30" cy="52" rx="5" ry="3.5" fill="rgba(255,255,255,0.18)" transform="rotate(-20 30 52)"/>
      <!-- subtle darkening at bottom -->
      <ellipse cx="50" cy="85" rx="30" ry="22" fill="rgba(0,0,0,0.18)"/>
      <defs>
        <radialGradient id="berryGrad" cx="38%" cy="32%" r="65%">
          <stop offset="0%"   stop-color="#ff6b6b"/>
          <stop offset="45%"  stop-color="#cc1111"/>
          <stop offset="100%" stop-color="#6b0000"/>
        </radialGradient>
      </defs>
    </svg>

    <!-- Splat (hidden until hover) -->
    <div class="splat-root" id="splatRoot">

      <!-- drip drops -->
      <div class="drip" style="width:15px;height:21px;top:-16px;left:44px;--dx:-18px;--dy:-48px;"></div>
      <div class="drip" style="width:9px; height:13px;top:12px; right:-14px;--dx:38px;--dy:-22px;"></div>
      <div class="drip" style="width:13px;height:19px;bottom:-12px;left:22px;--dx:-14px;--dy:44px;"></div>
      <div class="drip" style="width:7px; height:10px;bottom:22px;right:-10px;--dx:32px;--dy:32px;"></div>
      <div class="drip" style="width:11px;height:15px;top:32px; left:-12px;--dx:-36px;--dy:-8px;"></div>
      <div class="drip" style="width:16px;height:11px;top:-6px; right:32px; --dx:12px;--dy:-50px;border-radius:60%;"></div>
      <div class="drip" style="width:8px; height:8px; bottom:10px;left:10px;--dx:-40px;--dy:18px;border-radius:50%;"></div>

      <!-- blob SVG -->
      <svg class="splat-svg" viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
        <!-- outer splat layer -->
        <path d="M95 10 C130 5, 175 28, 182 62 C192 100, 175 145, 148 165 C118 188, 68 186, 42 165 C14 143, 2 108, 8 72 C14 36, 55 16, 95 10 Z"
              fill="url(#splatGrad1)" opacity="0.8"/>
        <!-- mid splat layer -->
        <path d="M95 22 C124 16, 168 38, 173 72 C180 108, 164 148, 138 162 C110 178, 65 174, 42 154 C18 133, 10 100, 16 68 C22 38, 62 28, 95 22 Z"
              fill="url(#splatGrad2)"/>
        <!-- juice drips on main shape -->
        <ellipse cx="155" cy="90" rx="12" ry="8"  fill="#cc0000" opacity="0.7" transform="rotate(20 155 90)"/>
        <ellipse cx="40"  cy="130" rx="10" ry="7"  fill="#aa0000" opacity="0.6" transform="rotate(-15 40 130)"/>
        <ellipse cx="95"  cy="175" rx="8"  ry="12" fill="#bb0000" opacity="0.65"/>
        <ellipse cx="32"  cy="68"  rx="9"  ry="6"  fill="#cc1111" opacity="0.55" transform="rotate(-30 32 68)"/>
        <!-- inner highlight -->
        <ellipse cx="72" cy="72" rx="22" ry="16" fill="rgba(255,120,120,0.22)" transform="rotate(-20 72 72)"/>
        <defs>
          <radialGradient id="splatGrad1" cx="42%" cy="36%" r="62%">
            <stop offset="0%"   stop-color="#ff4444"/>
            <stop offset="100%" stop-color="#7a0000"/>
          </radialGradient>
          <radialGradient id="splatGrad2" cx="38%" cy="32%" r="60%">
            <stop offset="0%"   stop-color="#ee3333"/>
            <stop offset="55%"  stop-color="#bb0000"/>
            <stop offset="100%" stop-color="#600000"/>
          </radialGradient>
        </defs>
      </svg>

      <!-- text inside splat -->
      <div class="splat-label" id="splatLabel">
        <span>FOOD<br>FIGHT</span>
      </div>

    </div><!-- /splat-root -->
  </div><!-- /berry-wrap -->

  <div class="hover-hint" id="hoverHint">hover me</div>

</section><!-- /hero -->

<!-- ═══ COMING SOON ══════════════════════════════════════════════════════════ -->
<div class="coming-soon-bar">
  <div class="coming-soon-text">⚔ &nbsp; Coming Soon &nbsp; ⚔</div>
</div>

<!-- ═══ STORE / ROSTER ════════════════════════════════════════════════════════ -->
<section class="store" id="store">

  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 5%,rgba(140,20,20,0.12),transparent 50%);pointer-events:none;"></div>

  <div class="store-eyebrow">The Roster</div>
  <div class="store-title">13 Fighters</div>
  <div class="store-sub">All locked until launch — hover to peek</div>

  <div class="card-grid" id="cardGrid"></div>

  <div class="pack-row">
    <div class="pack-card" id="packCard">
      <div class="pack-icon">🎴</div>
      <div class="pack-title">Starter Pack</div>
      <div class="pack-sub-label">??? coins</div>
      <div class="pack-seal">🍓</div>
    </div>
    <button class="cta-btn" id="ctaBtn" onclick="handleNotify()">Notify Me at Launch</button>
    <div class="count-badge">13 Cards · 1 Set · 0 Revealed</div>
  </div>

</section>


<script>
// ── CARD DATA ────────────────────────────────────────────────────────────────
const ROSTER = [
  { emoji:"🍓", name:"Berry Bruiser",    cost:1 },
  { emoji:"🌮", name:"Taco Terror",      cost:3 },
  { emoji:"🍕", name:"Pizza Paladin",    cost:4 },
  { emoji:"🥦", name:"Broccoli Baron",   cost:2 },
  { emoji:"🍩", name:"Donut Destroyer",  cost:5 },
  { emoji:"🌶", name:"Chili Champion",   cost:3 },
  { emoji:"🍦", name:"Ice Cream Imp",    cost:2 },
  { emoji:"🥑", name:"Avo Avenger",      cost:4 },
  { emoji:"🍜", name:"Noodle Ninja",     cost:3 },
  { emoji:"🥕", name:"Carrot Crusher",   cost:1 },
  { emoji:"🍄", name:"Mushroom Mage",    cost:5 },
  { emoji:"🍋", name:"Lemon Lord",       cost:2 },
  { emoji:"🧄", name:"Garlic Ghost",     cost:6 },
];

// ── RENDER CARDS ─────────────────────────────────────────────────────────────
const grid = document.getElementById('cardGrid');
ROSTER.forEach((card, i) => {
  const dur   = (2.2 + (i % 6) * 0.35).toFixed(2);
  const dly   = ((i * 0.28) % 2.4).toFixed(2);
  const rdly  = (i * 0.07).toFixed(2);
  const el    = document.createElement('div');
  el.className = 't-card';
  el.style.cssText = `animation: cardFloat ${dur}s ${dly}s ease-in-out infinite, cardReveal 0.5s ${rdly}s ease-out both;`;
  el.innerHTML = `
    <div class="t-card-inner">
      <div class="card-cost">${card.cost}</div>
      <div class="card-emoji-wrap">${card.emoji}</div>
      <div class="card-q">?</div>
      <div class="card-label">${card.name}</div>
    </div>
  `;
  grid.appendChild(el);
});

// ── FLOATING FOOD PARTICLES ──────────────────────────────────────────────────
const FOODS = ['🍓','🌶','🍕','🥦','🍩','🌮','🍦','🥑','🍋','🧄','🍜','🥕','🍄'];
const container = document.getElementById('particles');
for (let i = 0; i < 22; i++) {
  const p    = document.createElement('div');
  const dur  = (9 + Math.random() * 11).toFixed(1);
  const dly  = (Math.random() * 9).toFixed(1);
  const size = (10 + Math.random() * 13).toFixed(0);
  p.className = 'particle';
  p.style.cssText = `
    left: ${(Math.random() * 100).toFixed(1)}%;
    font-size: ${size}px;
    animation-duration: ${dur}s;
    animation-delay: ${dly}s;
    background: transparent;
    font-family: serif;
    text-align: center;
    line-height: 1;
    user-select: none;
  `;
  p.textContent = FOODS[Math.floor(Math.random() * FOODS.length)];
  container.appendChild(p);
}

// ── BERRY SPLAT ──────────────────────────────────────────────────────────────
const berryWrap  = document.getElementById('berryWrap');
const splatRoot  = document.getElementById('splatRoot');
const hoverHint  = document.getElementById('hoverHint');
let splatted     = false;
let resetTimer   = null;

function doSplat() {
  if (splatted) return;
  splatted = true;
  clearTimeout(resetTimer);
  berryWrap.classList.add('splatted');
  hoverHint.style.opacity = '0';
  hoverHint.style.transition = 'opacity 0.3s';

  // Re-trigger drip animations (force reflow)
  berryWrap.querySelectorAll('.drip').forEach(d => {
    d.style.animation = 'none';
    void d.offsetWidth;
    d.style.animation = '';
  });
}

function undoSplat() {
  resetTimer = setTimeout(() => {
    // Force-reset splat animation by cloning trick
    const clone = splatRoot.cloneNode(true);
    splatRoot.parentNode.replaceChild(clone, splatRoot);
    berryWrap.classList.remove('splatted');
    splatted = false;
    hoverHint.style.opacity   = '';
    hoverHint.style.transition = 'opacity 0.6s 0.3s';
    // re-attach event listener to new splatRoot is not needed since
    // berryWrap listener still captures
  }, 700);
}

berryWrap.addEventListener('mouseenter', doSplat);
berryWrap.addEventListener('mouseleave', undoSplat);

// touch support
berryWrap.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!splatted) { doSplat(); }
  else { undoSplat(); splatted = false; }
}, { passive: false });

// ── NOTIFY BUTTON ─────────────────────────────────────────────────────────────
function handleNotify() {
  const btn = document.getElementById('ctaBtn');
  btn.textContent = '✓ You\'re on the list!';
  btn.classList.add('done');
  btn.disabled = true;
}

// ── PACK CARD wobble on hover ─────────────────────────────────────────────────
const packCard = document.getElementById('packCard');
packCard.addEventListener('mouseenter', () => {
  packCard.style.animation = 'packPulse 2.4s ease-in-out infinite';
});
</script>
